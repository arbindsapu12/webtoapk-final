plugins {
    id 'com.android.application'
}

android {
    namespace "com.webtoapk"
    compileSdk 34

    defaultConfig {
        applicationId "com.webtoapk"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"

        buildConfigField "String", "WEBSITE_URL", "\"https://example.com\""
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
